    <script>
        const API_BASE = window.location.origin;

    //const askingAboutChart = message.toLowerCase().includes("chart") || 
      //                       message.toLowerCase().includes("analyze") ||
        //                     message.toLowerCase().includes("show") ||
          //                   message.toLowerCase().includes("what");
            //                 message.toLowerCase().includes("explain") ||
              //               message.toLowerCase().includes("information") ||
                //             message.toLowerCase().includes("understand") ||
                  //           message.toLowerCase().includes("tell me") ||
                    //         message.toLowerCase().includes("interpret");

    if (loadedStock  && !sidebarIsHidden) {

}

        // ← MODIFIED: Add message function with feedback buttons
        function addMessage(text, sender) {
            const chatMessages = document.getElementById("chatMessages");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;

            let innerStructure = '';
            const currentTime = getCurrentTimeLabel();
            const messageId = `msg_${Date.now()}`; // ← NEW: Unique ID

            if (sender === 'agent') {
                innerStructure += `
                    <div class="agent-icon-wrapper">
                        <i data-lucide="trending-up" style="width: 18px; height: 18px;"></i>
                    </div>`;
            }

            innerStructure += `
                <div class="message-content-wrapper">
                    <div class="message-content"></div>
                    <div class="message-time">${currentTime}</div>
                    ${sender === 'agent' ? `
                        <div class="feedback-buttons" id="feedback_${messageId}">
                            <button class="feedback-btn" onclick="sendFeedback('${messageId}', 'helpful')" title="Helpful">
                                <i data-lucide="thumbs-up" style="width: 14px; height: 14px;"></i>
                            </button>
                            <button class="feedback-btn" onclick="sendFeedback('${messageId}', 'not_helpful')" title="Not Helpful">
                                <i data-lucide="thumbs-down" style="width: 14px; height: 14px;"></i>
                            </button>
                        </div>
                    ` : ''}
                </div>`;

            messageDiv.innerHTML = innerStructure;
            messageDiv.id = messageId; // ← NEW: Store ID on element
            
            const contentDiv = messageDiv.querySelector('.message-content');
            contentDiv.innerHTML = formatResponse(text);

            chatMessages.appendChild(messageDiv);
            lucide.createIcons();
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ← NEW: Send feedback to backend
        async function sendFeedback(messageId, feedbackType) {
        const feedbackDiv = document.getElementById(`feedback_${messageId}`);
        const buttons = feedbackDiv.querySelectorAll('.feedback-btn');
    
        // Disable buttons after feedback
        buttons.forEach(btn => btn.classList.add('submitted'));
        buttons.forEach(btn => btn.disabled = true);
    
        try {
            const formData = new FormData();
            formData.append("message_id", messageId);
            formData.append("feedback", feedbackType);
            formData.append("session_id", sessionId);
            formData.append("timestamp", new Date().toISOString());
        
            const response = await fetch(`${API_BASE}/feedback`, {
                method: "POST",
                body: formData  // ← CHANGED: Use FormData instead of JSON
            });
        
            if (response.ok) {
                console.log("Feedback recorded:", feedbackType);
            } else {
                console.error("Feedback error:", response.statusText);
            }
        } catch (error) {
            console.error("Feedback error:", error);
        }
    }

        function formatResponse(text) {
            const lines = text.split('\n');
            let html = '';
            let i = 0;

            while (i < lines.length) {
                const line = lines[i];

                if (line.trim().startsWith('|')) {
                    let tableLines = [];
                    while (i < lines.length && lines[i].trim().startsWith('|')) {
                        tableLines.push(lines[i]);
                        i++;
                    }
                    html += renderTable(tableLines);
                } else if (line.trim()) {
                    html += `<p style="margin-bottom: 0.4rem; line-height: 1.6;">${escapeHtml(line)}</p>`;
                    i++;
                } else {
                    i++;
                }
            }

            return html || text;
        }

        function renderTable(tableLines) {
            if (tableLines.length < 2) return '';

            const headerLine = tableLines[0];
            const dataLines = tableLines.slice(2);

            const headers = headerLine.split('|')
                .map(h => h.trim())
                .filter(h => h && h !== '');

            const rows = dataLines
                .map(line => line.split('|')
                    .map(cell => cell.trim())
                    .filter((cell, idx) => idx > 0 && idx <= headers.length)
                )
                .filter(row => row.some(cell => cell));

            if (headers.length === 0) return '';

            let html = `
                <div style="background: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; margin: 1rem 0;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                        <thead>
                            <tr style="background: #1f2937; border-bottom: 1px solid rgba(255,255,255,0.1);">`;

            headers.forEach(header => {
                html += `<th style="color: #38bdf8; padding: 0.75rem 1rem; text-align: left; font-weight: 600;">${escapeHtml(header)}</th>`;
            });

            html += `</tr></thead><tbody>`;

            rows.forEach((row, idx) => {
                html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.02); background: ${idx % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.01)'};">`;
                row.forEach(cell => {
                    html += `<td style="padding: 0.75rem 1rem; color: #9ca3af;">${escapeHtml(cell)}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table></div>`;
            return html;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showLoading() {

                        </div>
                    </div>
                </div>`;
            chatMessages.appendChild(loadingDiv);
            lucide.createIcons();
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

function removeLoading() {
            const loading = document.getElementById("loading");
            if (loading) loading.remove();
        }

    if (!ticker) return;
    
    // ← NEW: Normalize ticker input
    // Remove spaces, convert to uppercase, remove special characters
    ticker = ticker.trim().toUpperCase().replace(/\s+/g, '').replace(/-/g, '');
    
    // Common stock name mappings
    const stockMappings = {
        'HDFCBANK': 'HDFCBANK',
        'ICICIBANK': 'ICICIBANK',
        'AXISBANK': 'AXISBANK',
        'TCS': 'TCS',
        'INFOSYS': 'INFOSYS',
        'INFY': 'INFOSYS',
        'RELIANCE': 'RELIANCE',
        'RIL': 'RELIANCE',
        'HDFC': 'HDFCBANK',
        'ICICI': 'ICICIBANK',
        'AXIS': 'AXISBANK',
        'ITC': 'ITC',
        'ASHOKLEY': 'Ashok Leyland',
        'ETERNAL': 'Zomato',
        'LTNT': 'LT',
        'MARUTI': 'MARUTI',
        'BAJAJFINSV': 'BAJAJFINSV',
        'JSWSTEEL': 'JSWSTEEL',
        'NTPC': 'NTPC',
        'SBIN': 'SBIN',
        'BEL': 'Bharat electonics'
    };
    
    // Map common aliases to actual ticker
    ticker = stockMappings[ticker] || ticker;
    
    try {
        const response = await fetch(
            `${API_BASE}/chart-data/${ticker}?period=${period}`
        );
        const data = await response.json();
        
        if (data.error) {
            alert("Error loading chart data");
            return;
        }
        
        // Update indicators
        document.getElementById('rsiValue').textContent = data.current_rsi;
        document.getElementById('rsiStatus').textContent = data.rsi_status;
        document.getElementById('priceValue').textContent = `₹${data.current_price}`;
        document.getElementById('macdValue').textContent = data.macd;
        
        // ← NEW: Update new indicator fields
        document.getElementById('ema50Value').textContent = `₹${data.ema_50}`;
        document.getElementById('ema200Value').textContent = `₹${data.ema_200}`;
        document.getElementById('peRatioValue').textContent = data.pe_ratio || 'N/A';
        
        // Draw candlestick chart (using Plotly)
        drawCandlestickChart(data.candlestick_data);
        
        // Generate follow-up suggestions
        generateSuggestions(ticker);
        
    } catch (error) {
        console.error("Chart error:", error);
    }
}

// Draw candlestick chart using Plotly
function drawCandlestickChart(data) {

    const trace = {
        x: data.map(d => d.date),
        open: data.map(d => d.open),
        high: data.map(d => d.high),
        low: data.map(d => d.low),
        close: data.map(d => d.close),
        type: "candlestick",

        increasing: {
            line: { color: "#22c55e" },
            fillcolor: "#22c55e"
        },

        decreasing: {
            line: { color: "#ef4444" },
            fillcolor: "#ef4444"
        }
    };
    

    const layout = {

        autosize: true,
        height: 240,
        dragmode:"zoom",

        margin: {
            l: 35,
            r: 15,
            t: 10,
            b: 20
        },

        paper_bgcolor: "#111827",
        plot_bgcolor: "#111827",

        font: {
            color: "#CBD5E1"
        },

        showlegend: false,

        xaxis: {
    showgrid: true,
    gridcolor: "#1E293B",

    rangeslider: {
        visible: true
    },

    fixedrange: false,

    showline: false,
    zeroline: false,

    title: ""
},

        yaxis: {
            showgrid: true,
            gridcolor: "#1E293B",

            showline: false,
            zeroline: false,

            title: ""
        }

    };

    Plotly.react(
        "candlestickChart",
        [trace],
        layout,
        {
            responsive: true,
            displayModeBar: true
        }
    );

}

// Generate follow-up suggestions
function generateSuggestions(ticker){

    const container=document.getElementById("suggestionButtons");

    if(!container) return;

    const suggestions=[
        `Explain the PE ratio of ${ticker}`,
        `Compare ${ticker} with competitors`,
        `Show dividend history of ${ticker}`,
        `Latest news about ${ticker}`
    ];

    container.innerHTML=suggestions.map(s=>`
        <button onclick="setMessage('${s}')">
            ${s}
        </button>
    `).join("");

}

// Set message and send
function setMessage(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
}
// ← NEW: Toggle Stock Intelligence visibility
function toggleStockIntelligence() {
    const sidebar = document.getElementById('chartSidebar');
    const btn = document.querySelector('.toggle-intelligence-btn');
    
    console.log('Sidebar:', sidebar);
    console.log('Button:', btn);
    
    if (!sidebar) {
        console.error('Sidebar not found!');
        return;
    }
    
    if (!btn) {
        console.error('Button not found!');
        return;
    }
    
    sidebar.classList.toggle('hidden');
    btn.classList.toggle('active');
    
    localStorage.setItem('intelligenceVisible', !sidebar.classList.contains('hidden'));
    console.log('Toggle executed');
}

// ← NEW: Load saved preference on page load
function loadIntelligenceState() {
    const sidebar = document.getElementById('chartSidebar');
    const btn = document.querySelector('.toggle-intelligence-btn');
    
    if (!sidebar || !btn) return;
    
    const isVisible = localStorage.getItem('intelligenceVisible');
    if (isVisible === 'true') {
        sidebar.classList.remove('hidden');
        btn.classList.add('active');
    }
}
// ← NEW: Fetch chart data and enhance message with context
async function fetchAndEnhanceMessage(userMessage, stockName) {
    try {
        console.log("Fetching chart data for:", stockName);
        
        // Get current chart data
        const response = await fetch(`${API_BASE}/chart-data/${stockName}?period=1y`);
        const chartData = await response.json();
        
        console.log("Chart data received:", chartData);
        
        if (chartData.error) {
            console.log("Chart error, sending normal message");
            removeLoading();
            await sendNormalMessage(userMessage);
            return;
        }
        
        // Enhance message with chart context
        const enhancedMessage = `User is analyzing ${stockName} stock chart.

Current Technical Indicators:
- RSI (14): ${chartData.current_rsi} (${chartData.rsi_status})
- MACD: ${chartData.macd}
- Current Price: ₹${chartData.current_price}

User Question: "${userMessage}"

Based on the chart pattern and technical indicators shown, analyze and explain what the data tells us:`;
        
        console.log("Enhanced message prepared, sending to API");
        
        const formData = new FormData();
        formData.append("message", enhancedMessage);
        formData.append("session_id", sessionId);

        const chatResponse = await fetch(`${API_BASE}/chat`, {
            method: "POST",
            body: formData
        });

        console.log("Chat response status:", chatResponse.status);

        if (!chatResponse.ok) {
            throw new Error(`API error: ${chatResponse.statusText}`);
        }

        const data = await chatResponse.json();
        console.log("Chat response received:", data);
        
        removeLoading();
        addMessage(data.response, "agent");

        selectedFile = null;
        document.getElementById("docUpload").value = "";
        document.getElementById("fileStatus").innerHTML = "";

    } catch (error) {
        console.error("Chart fetch error:", error);
        removeLoading();
        addMessage(`⚠️ Error: ${error.message}`, "agent");
    }
}

// ← NEW: Send normal message (existing logic)
async function sendNormalMessage(userMessage) {
    try {
        const formData = new FormData();
        formData.append("message", userMessage);
        formData.append("session_id", sessionId);

        if (selectedFile) {
            formData.append("file", selectedFile);
        }

        const response = await fetch(`${API_BASE}/chat`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error(`API error: ${response.statusText}`);
        }

        const data = await response.json();
        removeLoading();
        addMessage(data.response, "agent");

        selectedFile = null;
        document.getElementById("docUpload").value = "";
        document.getElementById("fileStatus").innerHTML = "";

    } catch (error) {
        removeLoading();
        addMessage(`⚠️ Error: ${error.message}`, "agent");
    }
}
